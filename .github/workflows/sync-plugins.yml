name: Sync Plugin Versions

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for plugin updates
        id: check
        run: |
          FILE=".claude-plugin/marketplace.json"
          CHANGED=false

          # For each plugin in marketplace.json, check latest tag from its source repo
          for PLUGIN in $(jq -r '.plugins[].name' "$FILE"); do
            REPO_URL=$(jq -r --arg n "$PLUGIN" '.plugins[] | select(.name == $n) | .source.url' "$FILE")
            CURRENT_VER=$(jq -r --arg n "$PLUGIN" '.plugins[] | select(.name == $n) | .version' "$FILE")

            # Extract owner/repo from URL
            REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|\.git$||')

            # Get latest version tag
            LATEST_TAG=$(gh api "repos/${REPO}/tags" --jq '.[].name' 2>/dev/null \
              | grep '^v' | sort -V | tail -1)

            if [ -z "$LATEST_TAG" ]; then
              echo "⚠️ ${PLUGIN}: no version tags found"
              continue
            fi

            LATEST_VER="${LATEST_TAG#v}"
            if [ "$CURRENT_VER" = "$LATEST_VER" ]; then
              echo "✅ ${PLUGIN}: v${CURRENT_VER} (up to date)"
              continue
            fi

            # Get the commit SHA for this tag
            TAG_SHA=$(gh api "repos/${REPO}/git/ref/tags/${LATEST_TAG}" --jq '.object.sha' 2>/dev/null)
            # If it's an annotated tag, dereference to the commit
            TAG_TYPE=$(gh api "repos/${REPO}/git/tags/${TAG_SHA}" --jq '.object.type' 2>/dev/null || echo "commit")
            if [ "$TAG_TYPE" = "commit" ]; then
              COMMIT_SHA=$(gh api "repos/${REPO}/git/tags/${TAG_SHA}" --jq '.object.sha' 2>/dev/null || echo "$TAG_SHA")
            else
              COMMIT_SHA="$TAG_SHA"
            fi

            echo "🔄 ${PLUGIN}: v${CURRENT_VER} → v${LATEST_VER} (${COMMIT_SHA})"

            jq --arg n "$PLUGIN" --arg v "$LATEST_VER" --arg s "$COMMIT_SHA" \
              '(.plugins[] | select(.name == $n)) |= (.version = $v | .source.sha = $s)' \
              "$FILE" > tmp.json && mv tmp.json "$FILE"

            CHANGED=true
          done

          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto-sync plugin versions"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
