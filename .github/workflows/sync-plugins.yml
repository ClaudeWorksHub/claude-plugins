name: Sync Plugin Versions

on:
  repository_dispatch:
    types: [plugin-update]

  # Manual fallback
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name (e.g. agora)'
        required: true
      version:
        description: 'Version (e.g. 2.1.0)'
        required: true
      sha:
        description: 'Commit SHA from plugin repo'
        required: true

permissions:
  contents: write

jobs:
  update-marketplace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "plugin=${{ github.event.client_payload.plugin }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "plugin=${{ inputs.plugin }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update marketplace.json
        run: |
          PLUGIN="${{ steps.params.outputs.plugin }}"
          VERSION="${{ steps.params.outputs.version }}"
          SHA="${{ steps.params.outputs.sha }}"
          FILE=".claude-plugin/marketplace.json"

          echo "Updating ${PLUGIN} to v${VERSION} (${SHA})"

          jq --arg name "$PLUGIN" --arg ver "$VERSION" --arg sha "$SHA" \
            '(.plugins[] | select(.name == $name)) |= (.version = $ver | .source.sha = $sha)' \
            "$FILE" > tmp.json && mv tmp.json "$FILE"

          # Verify
          UPDATED=$(jq -r --arg name "$PLUGIN" '.plugins[] | select(.name == $name) | .version' "$FILE")
          if [ "$UPDATED" != "$VERSION" ]; then
            echo "::error::Update failed — expected ${VERSION}, got ${UPDATED}"
            exit 1
          fi
          echo "✅ ${PLUGIN} updated to v${VERSION}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update ${{ steps.params.outputs.plugin }} plugin to v${{ steps.params.outputs.version }}"
          git push
